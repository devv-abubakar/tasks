<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal | Task Submission</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --success: #10b981;
            --success-bg: #d1fae5;
            --warning: #f59e0b;
            --warning-bg: #fef3c7;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); line-height: 1.6; padding: 20px; display: flex; justify-content: center; min-height: 100vh; }
        .container { width: 100%; max-width: 600px; margin-top: 40px; }
        .card { background: var(--card-bg); padding: 30px 40px; border-radius: 16px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); border: 1px solid var(--border-color); margin-bottom: 24px; }
        .header { text-align: center; margin-bottom: 30px; }
        .header h2 { font-size: 24px; font-weight: 800; color: var(--text-main); margin-bottom: 8px; }
        .header p { color: var(--text-muted); font-size: 14px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 13px; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        select, input[type="text"] { width: 100%; padding: 14px 16px; font-size: 15px; border: 1.5px solid var(--border-color); border-radius: 10px; background-color: #f8fafc; color: var(--text-main); transition: all 0.3s ease; outline: none; }
        select:focus, input[type="text"]:focus { border-color: var(--primary); background-color: #fff; box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1); }
        button { width: 100%; background-color: var(--primary); color: white; border: none; padding: 16px; font-size: 16px; font-weight: 700; border-radius: 10px; cursor: pointer; transition: all 0.3s ease; }
        button:hover { background-color: var(--primary-hover); transform: translateY(-1px); }
        button:disabled { background-color: #94a3b8; cursor: not-allowed; }
        
        .task-list-header { font-size: 18px; font-weight: 700; margin-bottom: 16px; border-bottom: 2px solid var(--border-color); padding-bottom: 10px; }
        .task-item { background: #fff; padding: 20px; border: 1px solid var(--border-color); border-radius: 12px; margin-bottom: 16px; display: flex; flex-direction: column; gap: 10px; }
        .task-info { display: flex; justify-content: space-between; align-items: flex-start; gap: 15px; }
        .task-link { color: var(--primary); text-decoration: none; font-weight: 600; word-break: break-all; font-size: 14px; line-height: 1.4; }
        .badge { padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; text-transform: uppercase; white-space: nowrap; }
        .status-pending { background-color: var(--warning-bg); color: #b45309; }
        .status-complete { background-color: var(--success-bg); color: #047857; }
        
        .feedback-section { margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--border-color); }
        .marks-badge { background-color: var(--primary); color: white; font-weight: 700; padding: 6px 12px; border-radius: 8px; font-size: 13px; display: inline-block; margin-bottom: 8px; }
        .remarks-box { background-color: #f0fdf4; border-left: 4px solid var(--success); padding: 10px 14px; border-radius: 0 8px 8px 0; font-size: 13px; color: #166534; font-weight: 500; }
        
        .admin-link { display: flex; justify-content: center; align-items: center; gap: 6px; margin-top: 20px; font-size: 14px; font-weight: 600; color: var(--text-muted); text-decoration: none; }
        .empty-state { text-align: center; padding: 30px; color: var(--text-muted); font-style: italic; background: #f8fafc; border-radius: 12px; border: 1px dashed #cbd5e1; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div class="header">
            <h2>Student Task Portal</h2>
            <p>Submit your repository links securely.</p>
        </div>
        <div class="form-group"><label>Select Assignment</label><select id="taskSelect"></select></div>
        <div class="form-group"><label>Task Link</label><input type="text" id="githubLink" placeholder="github.com/username/repo" required></div>
        <button id="submitBtn">Submit Assignment</button>
    </div>

    <div class="card">
        <h3 class="task-list-header">Your Submissions</h3>
        <div id="submissionsList"><div class="empty-state">Connecting to database...</div></div>
    </div>

    <a href="admin.html" class="admin-link">Admin Portal Access</a>
</div>

<script>
    const taskSelect = document.getElementById('taskSelect');
    for(let i = 1; i <= 20; i++) {
        let opt = document.createElement('option');
        opt.value = `Task ${i}`; opt.textContent = `Task ${i}`; taskSelect.appendChild(opt);
    }

    const supabaseUrl = 'https://ptwgiadzpzawjftfxwwf.supabase.co'; 
    const supabaseKey = 'sb_publishable_Qoy-USZ2VP94_n5x1BcjWQ_HV5deVBB'; 
    
    try {
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
        const linkInput = document.getElementById('githubLink');
        const submitBtn = document.getElementById('submitBtn');
        const listContainer = document.getElementById('submissionsList');

        async function fetchTasks() {
            listContainer.innerHTML = '<div class="empty-state">Loading your submissions...</div>';
            const { data, error } = await supabase.from('student_tasks').select('*').eq('task_name', taskSelect.value).order('id', { ascending: false });
            if (error) { listContainer.innerHTML = `<div class="empty-state" style="color:#ef4444;">Error: Database connection failed.</div>`; return; }
            listContainer.innerHTML = '';
            if(data.length === 0) { listContainer.innerHTML = '<div class="empty-state">No submissions found for this task yet.</div>'; return; }
            
            data.forEach(t => {
                const div = document.createElement('div');
                div.className = 'task-item';
                const statusClass = t.status === 'Complete' ? 'status-complete' : 'status-pending';
                
                let feedbackHtml = '';
                if (t.status === 'Complete') {
                    feedbackHtml = `
                    <div class="feedback-section">
                        ${t.marks ? `<div class="marks-badge">Score: ${t.marks}/10</div>` : ''}
                        ${t.remarks ? `<div class="remarks-box"><strong>Instructor Remarks:</strong> ${t.remarks}</div>` : ''}
                    </div>`;
                }
                
                div.innerHTML = `
                    <div class="task-info">
                        <a href="${t.link}" target="_blank" class="task-link">🔗 ${t.link}</a>
                        <span class="badge ${statusClass}">${t.status}</span>
                    </div>
                    ${feedbackHtml}
                `;
                listContainer.appendChild(div);
            });
        }

        submitBtn.onclick = async () => {
            let finalLink = linkInput.value.trim();
            if(!finalLink) return alert("Please enter a link!");
            if (!finalLink.startsWith('http://') && !finalLink.startsWith('https://')) finalLink = 'https://' + finalLink;
            
            submitBtn.disabled = true; submitBtn.textContent = "Submitting securely...";
            const { error } = await supabase.from('student_tasks').insert([{ task_name: taskSelect.value, link: finalLink, status: 'Pending' }]);
            
            if (error) alert("Error submitting task!"); else { linkInput.value = ''; fetchTasks(); }
            submitBtn.disabled = false; submitBtn.textContent = "Submit Assignment";
        };
        taskSelect.onchange = fetchTasks; fetchTasks();
    } catch(err) { listContainer.innerHTML = '<div class="empty-state">System failed.</div>'; }
</script>
</body>
</html>
