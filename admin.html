<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instructor Portal | Grade Tasks</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #0f172a;
            --primary-hover: #1e293b;
            --action: #4f46e5;
            --action-hover: #4338ca;
            --success: #10b981;
            --warning: #f59e0b;
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); padding: 30px 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        .container { width: 100%; max-width: 800px; }
        
        #loginSection { max-width: 400px; background: var(--card-bg); padding: 40px 30px; border-radius: 16px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); margin-top: 50px; text-align: center; margin-left: auto; margin-right: auto; }
        #loginSection h2 { margin-bottom: 10px; color: var(--primary); }
        #loginSection p { color: var(--text-muted); font-size: 14px; margin-bottom: 25px; }
        #loginSection input { width: 100%; padding: 14px; margin-bottom: 15px; border: 1.5px solid var(--border-color); border-radius: 10px; outline: none; font-size: 15px; background: #f8fafc; transition: 0.3s;}
        #loginSection input:focus { border-color: var(--action); background: #fff; box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1); }
        #loginSection button { width: 100%; padding: 14px; background: var(--action); color: white; border: none; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; margin-top: 5px;}
        #loginSection button:hover { background: var(--action-hover); }
        #loginError { color: #ef4444; font-size: 13px; margin-top: 15px; display: none; font-weight: bold; background: #fef2f2; padding: 10px; border-radius: 8px; border: 1px solid #fca5a5;}

        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; background: var(--card-bg); padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .top-bar h1 { font-size: 22px; font-weight: 800; color: var(--primary); }
        .nav-links { display: flex; gap: 15px; align-items: center; }
        .nav-links a, .logout-btn { text-decoration: none; font-weight: 600; font-size: 14px; cursor: pointer; }
        .nav-links a { color: var(--text-muted); }
        .nav-links a:hover { color: var(--action); }
        .logout-btn { color: #ef4444; background: none; border: none; padding: 0; }
        .logout-btn:hover { text-decoration: underline; }

        .filter-group { background: var(--card-bg); padding: 20px; border-radius: 12px; margin-bottom: 25px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .filter-group label { display:block; font-size:12px; font-weight:700; color:var(--text-muted); margin-bottom:8px; text-transform:uppercase; }
        select { width: 100%; max-width: 300px; padding: 12px; font-size: 15px; border: 1.5px solid var(--border-color); border-radius: 8px; outline: none; background: #f8fafc; }
        select:focus { border-color: var(--action); }

        .task-card { border: 1px solid var(--border-color); padding: 25px; border-radius: 12px; margin-bottom: 16px; background-color: #fff; transition: box-shadow 0.2s; }
        .task-card:hover { box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); }
        .task-card.completed { border-left: 5px solid var(--success); }
        .task-card.pending { border-left: 5px solid var(--warning); }
        
        .task-header { display: flex; justify-content: space-between; margin-bottom: 15px; align-items: center; }
        .task-title { font-weight: 800; font-size: 18px; color: var(--primary); }
        .task-link { color: var(--action); text-decoration: none; word-break: break-all; font-size: 15px; font-weight: 600; display: block; margin-bottom: 20px; padding: 10px; background: #f8fafc; border-radius: 8px;}
        .task-link:hover { text-decoration: underline; background: #f1f5f9; }
        
        .grading-section { background: #f8fafc; padding: 20px; border-radius: 10px; border: 1px dashed #cbd5e1; display: flex; gap: 15px; flex-wrap: wrap; align-items: flex-end; }
        .input-box { flex: 1; min-width: 150px; }
        .input-box.large { flex: 2; min-width: 250px; }
        .input-box label { display: block; font-size: 12px; font-weight: 700; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; }
        .input-box input { width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 8px; font-size: 14px; outline: none; }
        .input-box input:focus { border-color: var(--action); box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }
        
        .btn-update { background-color: var(--primary); color: white; border: none; padding: 12px 24px; border-radius: 8px; font-weight: 700; cursor: pointer; transition: 0.2s; white-space: nowrap; }
        .btn-update:hover { background-color: var(--primary-hover); transform: translateY(-2px); }
        
        .badge { padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; text-transform: uppercase; }
        .bg-pending { background-color: #fef3c7; color: #b45309; }
        .bg-complete { background-color: #d1fae5; color: #047857; }
        
        .empty-state { text-align: center; padding: 40px; color: var(--text-muted); font-style: italic; background: #fff; border-radius: 12px; border: 1px dashed var(--border-color); }

        @media (max-width: 600px) {
            .grading-section { flex-direction: column; align-items: stretch; }
            .btn-update { width: 100%; margin-top: 10px; }
            .top-bar { flex-direction: column; gap: 15px; text-align: center; }
        }
    </style>
</head>
<body>

<div id="loginSection" class="container">
    <h2>Admin Login</h2>
    <p>Please enter your credentials to access the portal.</p>
    
    <input type="text" id="adminUsername" placeholder="Username" onkeypress="handleEnter(event)">
    <input type="password" id="adminPassword" placeholder="Password" onkeypress="handleEnter(event)">
    
    <button type="button" onclick="checkLogin()">Login to Dashboard</button>
    <p id="loginError">Incorrect Username or Password!</p>
    
    <a href="index.html" style="display:block; margin-top:20px; color:#64748b; font-size:14px; text-decoration:none; font-weight: 600;">← Back to Student Portal</a>
</div>

<div id="dashboardSection" class="container" style="display: none;">
    <div class="top-bar">
        <h1>Instructor Dashboard</h1>
        <div class="nav-links">
            <a href="index.html">Student Portal</a>
            <button type="button" class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>

    <div class="filter-group">
        <label>Filter Submissions by Task</label>
        <select id="filterSelect">
            <option value="All">Show All Tasks</option>
        </select>
    </div>

    <div id="adminList">
        <div class="empty-state">Loading submissions...</div>
    </div>
</div>

<script>
    // --- 1. LOGIN LOGIC ---
    const ADMIN_USER = "admin";
    const ADMIN_PASS = "12344231"; 

    function checkLogin() {
        const userField = document.getElementById('adminUsername');
        const passField = document.getElementById('adminPassword');
        const errortext = document.getElementById('loginError');
        
        if(!userField || !passField) return; 
        
        const user = userField.value.trim();
        const pass = passField.value.trim();
        
        errortext.style.display = 'none'; 

        if (user === ADMIN_USER && pass === ADMIN_PASS) {
            sessionStorage.setItem('admin_logged_in', 'true');
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('dashboardSection').style.display = 'block';
            fetchAdminTasks(); 
        } else {
            errortext.style.display = 'block';
        }
    }

    function handleEnter(e) {
        if (e.key === 'Enter') {
            e.preventDefault(); 
            checkLogin();
        }
    }

    function logout() {
        sessionStorage.removeItem('admin_logged_in');
        document.getElementById('adminUsername').value = '';
        document.getElementById('adminPassword').value = '';
        document.getElementById('loginError').style.display = 'none';
        document.getElementById('dashboardSection').style.display = 'none';
        document.getElementById('loginSection').style.display = 'block';
    }

    window.onload = () => {
        if (sessionStorage.getItem('admin_logged_in') === 'true') {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('dashboardSection').style.display = 'block';
            fetchAdminTasks();
        }
    };

    // --- 2. SUPABASE LOGIC FIX ---
    // Variable name changed to supabaseClient to prevent SyntaxError
    const supabaseUrl = 'https://ptwgiadzpzawjftfxwwf.supabase.co'; 
    const supabaseKey = 'sb_publishable_Qoy-USZ2VP94_n5x1BcjWQ_HV5deVBB'; 
    const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

    const filterSelect = document.getElementById('filterSelect');
    if (filterSelect) {
        for(let i = 1; i <= 20; i++) {
            let opt = document.createElement('option');
            opt.value = `Task ${i}`; opt.textContent = `Task ${i}`; filterSelect.appendChild(opt);
        }
        filterSelect.onchange = fetchAdminTasks;
    }

    async function fetchAdminTasks() {
        const adminList = document.getElementById('adminList');
        adminList.innerHTML = '<div class="empty-state">Fetching secure data...</div>';
        
        const filterVal = document.getElementById('filterSelect').value;
        
        let query = supabaseClient.from('student_tasks').select('*').order('id', { ascending: false });
        if (filterVal !== 'All') { query = query.eq('task_name', filterVal); }
        
        const { data, error } = await query;
        
        if (error) { 
            adminList.innerHTML = '<div class="empty-state" style="color:red;">Database error. Check internet connection.</div>'; 
            return; 
        }
        
        adminList.innerHTML = '';
        if (data.length === 0) { adminList.innerHTML = '<div class="empty-state">No submissions found.</div>'; return; }

        data.forEach(t => {
            const isComplete = t.status === 'Complete';
            const div = document.createElement('div');
            div.className = `task-card ${isComplete ? 'completed' : 'pending'}`;
            
            div.innerHTML = `
                <div class="task-header">
                    <span class="task-title">${t.task_name}</span>
                    <span class="badge ${isComplete ? 'bg-complete' : 'bg-pending'}">${t.status}</span>
                </div>
                <a href="${t.link}" target="_blank" class="task-link">🔗 ${t.link}</a>
                
                <div class="grading-section">
                    <div class="input-box">
                        <label>Marks (Out of 10)</label>
                        <input type="number" id="marks-${t.id}" placeholder="e.g. 9" value="${t.marks || ''}">
                    </div>
                    <div class="input-box large">
                        <label>Instructor Remarks</label>
                        <input type="text" id="remarks-${t.id}" placeholder="e.g. Excellent work." value="${t.remarks || ''}">
                    </div>
                    <button type="button" class="btn-update" onclick="updateTask(${t.id}, event)">
                        ${isComplete ? 'Update Grade' : 'Mark Complete'}
                    </button>
                </div>
            `;
            adminList.appendChild(div);
        });
    }

    window.updateTask = async function(id, event) {
        const marksVal = document.getElementById(`marks-${id}`).value.trim();
        const remarksVal = document.getElementById(`remarks-${id}`).value.trim();
        
        const btn = event.target;
        const originalText = btn.textContent;
        btn.textContent = "Saving...";
        btn.disabled = true;

        const { error } = await supabaseClient.from('student_tasks')
            .update({ status: 'Complete', marks: marksVal, remarks: remarksVal })
            .eq('id', id);

        if (error) {
            alert("Error updating task.");
            btn.textContent = originalText;
            btn.disabled = false;
        } else {
            fetchAdminTasks();
        }
    };
</script>
</body>
</html>
